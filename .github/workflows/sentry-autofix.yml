name: Sentry Auto-Diagnosis

on:
  repository_dispatch:
    types: [sentry-error]

jobs:
  diagnose:
    name: Diagnose & Fix
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Analyze error and create fix PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node << 'SCRIPT'
          const { execSync } = require("child_process");

          const payload = ${{ toJson(github.event.client_payload) }};
          const { title, culprit, url, stacktrace, filename } = payload;

          console.log("=== Sentry Error ===");
          console.log("Title:", title);
          console.log("Culprit:", culprit);
          console.log("Stacktrace:", stacktrace);
          console.log("File:", filename);

          // Find relevant source files
          let relevantCode = "";
          if (filename) {
            try {
              // Search for the file in src/
              const possiblePaths = [
                `src/${filename}`,
                `src/app/${filename}`,
                filename,
              ];
              for (const p of possiblePaths) {
                try {
                  const content = require("fs").readFileSync(p, "utf8");
                  relevantCode += `\n--- ${p} ---\n${content.slice(0, 4000)}\n`;
                  break;
                } catch {}
              }
            } catch {}
          }

          // If no file found from culprit, try to grep for the error
          if (!relevantCode && title) {
            try {
              const keyword = title.split(":")[0].trim().split(" ").pop();
              if (keyword && keyword.length > 3) {
                const grep = execSync(
                  `grep -rl "${keyword}" src/ --include="*.ts" --include="*.tsx" | head -3`,
                  { encoding: "utf8", timeout: 5000 }
                ).trim();
                for (const file of grep.split("\n").filter(Boolean)) {
                  const content = require("fs").readFileSync(file, "utf8");
                  relevantCode += `\n--- ${file} ---\n${content.slice(0, 3000)}\n`;
                }
              }
            } catch {}
          }

          // Call Claude to analyze
          async function analyze() {
            const res = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-api-key": process.env.ANTHROPIC_API_KEY,
                "anthropic-version": "2023-06-01",
              },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 2000,
                messages: [
                  {
                    role: "user",
                    content: `You are a senior engineer diagnosing a production error in a Next.js app (Quotd — AI interview platform).

          ERROR: ${title}
          CULPRIT: ${culprit}
          STACKTRACE:
          ${stacktrace}

          RELEVANT CODE:
          ${relevantCode || "No source code found for this error."}

          Provide:
          1. **Root cause** (1-2 sentences)
          2. **Fix** — exact code change needed (show the diff)
          3. **Severity** — critical / high / medium / low
          4. **Confidence** — how sure are you this fix is correct (high/medium/low)

          Be concise. If you can't determine the fix from the available code, say so and describe what to investigate.`,
                  },
                ],
              }),
            });

            if (!res.ok) {
              console.error("Claude API error:", res.status, await res.text());
              return null;
            }

            const data = await res.json();
            return data.content[0].text;
          }

          analyze().then((diagnosis) => {
            if (!diagnosis) {
              console.log("Failed to get diagnosis from Claude");
              process.exit(1);
            }

            console.log("\n=== Diagnosis ===\n", diagnosis);

            // Create GitHub issue with diagnosis
            const issueBody = `## Sentry Error (Auto-Detected)

          **Error:** ${title}
          **Culprit:** ${culprit}
          ${url ? `**Sentry:** ${url}` : ""}

          ### Stacktrace
          \`\`\`
          ${stacktrace}
          \`\`\`

          ### AI Diagnosis
          ${diagnosis}

          ---
          *Auto-generated by Sentry → Claude pipeline*`;

            // Write issue body to file for gh cli
            require("fs").writeFileSync("/tmp/issue-body.md", issueBody);

            try {
              const result = execSync(
                `gh issue create --title "🔴 ${title.slice(0, 80)}" --body-file /tmp/issue-body.md --label "sentry,bug"`,
                { encoding: "utf8", env: { ...process.env, GH_TOKEN: process.env.GITHUB_TOKEN } }
              );
              console.log("Issue created:", result.trim());
            } catch (e) {
              console.error("Failed to create issue:", e.message);
              // Try without labels (labels might not exist yet)
              try {
                const result = execSync(
                  `gh issue create --title "🔴 ${title.slice(0, 80)}" --body-file /tmp/issue-body.md`,
                  { encoding: "utf8", env: { ...process.env, GH_TOKEN: process.env.GITHUB_TOKEN } }
                );
                console.log("Issue created (no labels):", result.trim());
              } catch (e2) {
                console.error("Failed to create issue without labels:", e2.message);
              }
            }
          });
          SCRIPT
