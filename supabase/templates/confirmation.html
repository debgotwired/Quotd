<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your Quotd account</title>
</head>
<body style="background-color: #f6f9fc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Ubuntu, sans-serif; margin: 0; padding: 0;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding: 40px 0;">
    <tr>
      <td align="center">
        <table width="400" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; padding: 40px 20px; max-width: 400px;">
          <tr>
            <td align="center" style="padding-bottom: 24px;">
              <span style="color: #1a1a1a; font-size: 20px; font-weight: 700; letter-spacing: -0.02em;">Quotd</span>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom: 24px;">
              <h1 style="color: #1a1a1a; font-size: 24px; font-weight: 600; margin: 0;">Confirm your account</h1>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom: 24px;">
              <p style="color: #525f7f; font-size: 14px; line-height: 24px; margin: 0;">
                Click the button below to confirm your Quotd account.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom: 24px;">
              <a href="{{ .ConfirmationURL }}" style="display: inline-block; background-color: #1a1a1a; color: #ffffff; font-size: 14px; font-weight: 600; text-decoration: none; padding: 12px 32px; border-radius: 8px;">Confirm Account</a>
            </td>
          </tr>
          <tr>
            <td align="center">
              <p style="color: #8898aa; font-size: 12px; line-height: 20px; margin: 0;">
                If you didn't create an account with Quotd, you can safely ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
